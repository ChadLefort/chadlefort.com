# Generates Linux snapshots locally via Docker.
# Note: on Apple Silicon Macs the container runs ARM64 Linux, which may
# produce slightly different renders than CI (AMD64). For CI-identical
# snapshots use the "Update Playwright Snapshots" GitHub Actions workflow.
services:
  e2e:
    image: mcr.microsoft.com/playwright:v1.59.1-jammy
    working_dir: /work
    volumes:
      - .:/work
    command:
      - bash
      - -c
      - |
        apt-get update &&
        apt-get install -y poppler-utils imagemagick unzip curl &&
        curl -fsSL https://bun.sh/install | bash &&
        export PATH="/root/.bun/bin:$PATH" &&
        bun install --frozen-lockfile &&
        bun run test:e2e:update
