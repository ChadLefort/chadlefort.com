name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [master]
    paths:
      - "src/**"
      - "public/**"
      - "playwright.config.ts"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [master]
    paths:
      - "src/**"
      - "e2e/**"
      - "public/**"
      - "playwright.config.ts"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/ci.yml"
      - ".github/workflows/e2e.yml"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test

      - name: Build
        run: bun run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7
